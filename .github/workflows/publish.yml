name: Publish

# Publishes @openfantasymap/maplibre-grid to npm when a GitHub Release is
# published, or on manual dispatch. Uses npm Trusted Publishing (OIDC) — no
# NPM_TOKEN secret required.
#
# One-time setup on npmjs.com (package or scope → Settings → Trusted Publisher):
#   Provider:      GitHub Actions
#   Organization:  openfantasymap
#   Repository:    maplibre-grid
#   Workflow:      publish.yml
#   Environment:   (leave empty)
# For the first publish of a brand-new package, configure it as a "pending
# trusted publisher" under your account before running this workflow.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC / trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing requires npm CLI >= 11.5.1; Node 20 ships with npm 10.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm (trusted publishing + provenance)
        run: npm publish --provenance --access public
